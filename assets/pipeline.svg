<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 500" font-family="JetBrains Mono, monospace">
  <defs>
    <pattern id="grid" width="60" height="60" patternUnits="userSpaceOnUse">
      <line x1="60" y1="0" x2="60" y2="60" stroke="rgba(255,255,255,0.03)" stroke-width="1"/>
      <line x1="0" y1="60" x2="60" y2="60" stroke="rgba(255,255,255,0.03)" stroke-width="1"/>
    </pattern>
    <filter id="glow">
      <feGaussianBlur stdDeviation="3" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>
  <rect width="800" height="500" fill="#0c0c0c"/>
  <rect width="800" height="500" fill="url(#grid)"/>

  <!-- Corner brackets -->
  <path d="M16,21 L16,16 L21,16" stroke="#00ff88" stroke-width="1" fill="none"/>
  <path d="M779,16 L784,16 L784,21" stroke="rgba(255,255,255,0.08)" stroke-width="1" fill="none"/>
  <path d="M16,479 L16,484 L21,484" stroke="rgba(255,255,255,0.08)" stroke-width="1" fill="none"/>
  <path d="M779,484 L784,484 L784,479" stroke="rgba(255,255,255,0.08)" stroke-width="1" fill="none"/>

  <!-- Section header -->
  <text x="40" y="50" fill="#6b6560" font-size="9" letter-spacing="0.15em">// PIPELINE</text>

  <!-- Row 1: S3 Source (accent) -->
  <g transform="translate(400, 90)">
    <rect x="-120" y="-14" width="240" height="28" rx="2"
          fill="rgba(0,255,136,0.04)" stroke="rgba(0,255,136,0.25)" stroke-width="1"/>
    <text text-anchor="middle" y="4" fill="#00ff88" font-size="10" letter-spacing="0.05em">S3 (hl-*-evm-blocks)</text>
  </g>
  <text x="570" y="94" fill="#6b6560" font-size="8" letter-spacing="0.05em">LZ4 + MessagePack</text>

  <!-- Arrow -->
  <line x1="400" y1="106" x2="400" y2="133" stroke="#6b6560" stroke-width="1" stroke-dasharray="4,4"/>
  <polygon points="400,138 396,130 404,130" fill="#6b6560"/>

  <!-- Row 2: 512 Workers (accent) -->
  <g transform="translate(400, 158)">
    <rect x="-120" y="-14" width="240" height="28" rx="2"
          fill="rgba(0,255,136,0.04)" stroke="rgba(0,255,136,0.25)" stroke-width="1"/>
    <text text-anchor="middle" y="4" fill="#00ff88" font-size="10" letter-spacing="0.05em">512 Workers (semaphore)</text>
  </g>
  <text x="570" y="162" fill="#6b6560" font-size="8" letter-spacing="0.05em">bounded channel</text>

  <!-- Arrow -->
  <line x1="400" y1="174" x2="400" y2="201" stroke="#6b6560" stroke-width="1" stroke-dasharray="4,4"/>
  <polygon points="400,206 396,198 404,198" fill="#6b6560"/>

  <!-- Row 3: Decode (standard) -->
  <g transform="translate(400, 226)">
    <rect x="-140" y="-14" width="280" height="28" rx="2"
          fill="#141414" stroke="rgba(255,255,255,0.08)" stroke-width="1"/>
    <text text-anchor="middle" y="4" fill="#8a8578" font-size="10" letter-spacing="0.05em">Decode (serde + RLP + keccak)</text>
  </g>
  <text x="570" y="230" fill="#6b6560" font-size="8" letter-spacing="0.05em">dual phantom hash</text>

  <!-- Arrow -->
  <line x1="400" y1="242" x2="400" y2="269" stroke="#6b6560" stroke-width="1" stroke-dasharray="4,4"/>
  <polygon points="400,274 396,266 404,266" fill="#6b6560"/>

  <!-- Row 4: Batch Insert (standard) -->
  <g transform="translate(400, 294)">
    <rect x="-120" y="-14" width="240" height="28" rx="2"
          fill="#141414" stroke="rgba(255,255,255,0.08)" stroke-width="1"/>
    <text text-anchor="middle" y="4" fill="#8a8578" font-size="10" letter-spacing="0.05em">Batch Insert (UNNEST)</text>
  </g>
  <text x="570" y="298" fill="#6b6560" font-size="8" letter-spacing="0.05em">atomic cursor</text>

  <!-- Arrow -->
  <line x1="400" y1="310" x2="400" y2="337" stroke="#6b6560" stroke-width="1" stroke-dasharray="4,4"/>
  <polygon points="400,342 396,334 404,334" fill="#6b6560"/>

  <!-- Row 5: Storage — 3 nodes side by side -->
  <text x="400" y="365" text-anchor="middle" fill="#6b6560" font-size="9" letter-spacing="0.15em">// STORAGE</text>

  <g transform="translate(230, 400)">
    <rect x="-70" y="-14" width="140" height="28" rx="2"
          fill="#141414" stroke="rgba(255,255,255,0.08)" stroke-width="1"/>
    <text text-anchor="middle" y="4" fill="#8a8578" font-size="10" letter-spacing="0.05em">SQLite</text>
  </g>

  <g transform="translate(400, 400)">
    <rect x="-70" y="-14" width="140" height="28" rx="2"
          fill="#141414" stroke="rgba(255,255,255,0.08)" stroke-width="1"/>
    <text text-anchor="middle" y="4" fill="#8a8578" font-size="10" letter-spacing="0.05em">PostgreSQL</text>
  </g>

  <g transform="translate(570, 400)">
    <rect x="-70" y="-14" width="140" height="28" rx="2"
          fill="#141414" stroke="rgba(255,255,255,0.08)" stroke-width="1"/>
    <text text-anchor="middle" y="4" fill="#8a8578" font-size="10" letter-spacing="0.05em">ClickHouse</text>
  </g>

  <!-- Branching lines to storage nodes -->
  <line x1="400" y1="342" x2="230" y2="380" stroke="rgba(255,255,255,0.08)" stroke-width="1"/>
  <line x1="400" y1="342" x2="400" y2="380" stroke="rgba(255,255,255,0.08)" stroke-width="1"/>
  <line x1="400" y1="342" x2="570" y2="380" stroke="rgba(255,255,255,0.08)" stroke-width="1"/>

  <!-- Cursor annotation -->
  <text x="400" y="456" text-anchor="middle" fill="#6b6560" font-size="8" letter-spacing="0.05em">cursor tracks last-processed block per chain</text>
</svg>