services:
  clickhouse:
    image: clickhouse/clickhouse-server:24.3
    environment:
      CLICKHOUSE_USER: default
      CLICKHOUSE_PASSWORD: ""
      CLICKHOUSE_DEFAULT_ACCESS_MANAGEMENT: 1
    ports:
      - "8123:8123"
    volumes:
      - chdata:/var/lib/clickhouse
    healthcheck:
      test: ["CMD", "clickhouse-client", "--query", "SELECT 1"]
      interval: 5s
      timeout: 5s
      retries: 5
    ulimits:
      nofile:
        soft: 262144
        hard: 262144

  indexer:
    image: ghcr.io/exomonk/hypercore-indexer:latest
    depends_on:
      clickhouse:
        condition: service_healthy
    volumes:
      - ./hypercore.toml:/app/hypercore.toml
      - ${HOME}/.aws:/root/.aws:ro
    environment:
      - AWS_REGION=ap-northeast-1
    command: ["live"]
    restart: unless-stopped

volumes:
  chdata:
