services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: hypercore
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 5s
      retries: 5

  indexer:
    image: ghcr.io/exomonk/hypercore-indexer:latest
    # Or build locally:
    # build:
    #   context: ../..
    depends_on:
      postgres:
        condition: service_healthy
    volumes:
      - ./hypercore.toml:/app/hypercore.toml
      # Mount AWS credentials (profile-based auth)
      - ${HOME}/.aws:/root/.aws:ro
    environment:
      - AWS_REGION=ap-northeast-1
      # Or use env vars instead of mounted credentials:
      # - AWS_ACCESS_KEY_ID
      # - AWS_SECRET_ACCESS_KEY
    command: ["backfill", "--from", "5000000", "--to", "5000100"]

volumes:
  pgdata:
